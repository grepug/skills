name: Bug
description: A defect that needs investigation and correction
title: "bug: "
labels:
  - type:bug
  - priority:p2
body:
  - type: markdown
    attributes:
      value: |
        Write this issue in the repo working language defined in root `AGENTS.md`. If the repo does not define one, use English.

        Keep the issue deterministic. Record only the confirmed bug facts, chosen scope, and acceptance criteria. Do not include sections such as `Options considered`, alternatives, pros / cons, tradeoff matrices, or recommendations.
  - type: textarea
    id: problem
    attributes:
      label: Bug summary
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: reviewer_attention
    attributes:
      label: Reviewer attention
      description: Put only the review hotspots here so humans and agents can see the risky surfaces quickly. Call out material dependency changes, schema or data model changes, architecture or boundary changes, migrations, rollout risks, config or secret changes, or external setup. Write `None` only if there is genuinely no special review hotspot.
      placeholder: |
        Example:
        - Fix touches issue-template parsing logic shared by multiple skills; review for regressions in existing templates
        - Requires a migration of stored issue metadata; review backward compatibility and recovery path
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why this matters
      placeholder: What user, workflow, or system impact does this bug cause?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction or evidence
      description: Include repro steps plus the concrete anchors that prove the bug today, such as file paths, function names, logs, stack traces, failing commands, or a short code excerpt when that is the clearest evidence.
      placeholder: |
        Example:
        1. Reproduce the bug with the exact command or UI flow.
        2. Point to the current code path that explains it.
        3. Include the minimal log, failing assertion, or short code excerpt that removes ambiguity.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected outcome
      placeholder: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Constraints / non-goals
      placeholder: Clarify what should not be broadened while fixing this bug.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: How will we know the bug is fixed?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Initial priority
      description: The bundled default label is `priority:p2`. If the selected value differs, replace the label after issue creation.
      options:
        - priority:p0
        - priority:p1
        - priority:p2
        - priority:p3
    validations:
      required: true
  - type: textarea
    id: external_setup
    attributes:
      label: External setup dependencies
      description: Research the official provider or platform docs first, then record the real-world setup a human developer must perform before live verification can pass. For each item, include the provider, what must exist, how to get or configure it, where that happens, who needs access, official doc links, and what verification it unlocks. Never paste secret values into the issue; record the secret name, owning system, storage location, and retrieval path instead. Write `None` if not applicable.
      placeholder: |
        Example:
        - Provider/platform: Example Provider
          - What must exist: Sandbox account with the required scopes enabled
          - How to get or configure it: Admin creates the sandbox app and enables the needed scopes
          - Where to do that: Provider dashboard -> Developers -> Sandbox apps
          - Who needs access: Provider account admin
          - Official docs: https://example.com/docs
          - Unlocks: Live bug verification against the real provider
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected repo area
      placeholder: e.g. skills/github-issue-workflow, scripts/validate_skills.py, .github/ISSUE_TEMPLATE
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Default to the open milestone selected by the skill milestone rule. If the repo has no milestones and you have permission, create and use `1.0`; otherwise leave this blank or ask a maintainer to set one. Any PR for this issue should inherit the same milestone.
      placeholder: e.g. 1.0, 1.1, 2026-04
    validations:
      required: false
  - type: input
    id: ownership
    attributes:
      label: Owning layer or module
      placeholder: e.g. skills/github-issue-workflow, repo docs, GitHub workflow
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Narrow the proof to the touched surface only if that is intentional.
      placeholder: |
        python3 scripts/quick_validate_skill.py skills/<slug>
        python3 scripts/validate_skills.py
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Links / references
      placeholder: Link related issues, PRs, logs, screenshots, docs, or previous decisions.
    validations:
      required: false
