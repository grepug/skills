name: Research
description: Investigation, spike, or decision-making work
title: "research: "
labels:
  - type:research
  - priority:p2
body:
  - type: markdown
    attributes:
      value: |
        Write this issue in the repo working language defined in root `AGENTS.md`. If the repo does not define one, use English.

        Keep the issue deterministic. Record the research question, required output, constraints, and acceptance criteria only. Do not include sections such as `Options considered`, alternatives, pros / cons, tradeoff matrices, or recommendations in the issue body itself.
        Apply the same deterministic rule to later issue-thread comments: keep them factual and do not add `Execution is not started yet`, `Next runs`, `Run options`, or recommendation blocks.
  - type: textarea
    id: question
    attributes:
      label: Question to answer
      placeholder: What decision or unknown are we trying to resolve?
    validations:
      required: true
  - type: textarea
    id: reviewer_attention
    attributes:
      label: Reviewer attention
      description: Put only the review hotspots here so humans and agents can see what parts of the investigation need special scrutiny. Call out dependency choices, schema questions, architecture tradeoffs, rollout concerns, or external setup that this research needs to resolve. Write `None` only if there is genuinely no special review hotspot.
      placeholder: |
        Example:
        - Need a recommendation on whether to add a new dependency or reuse existing repo tooling
        - Need a concrete read on whether the current schema can support the workflow without a migration
    validations:
      required: true
  - type: textarea
    id: current_evidence
    attributes:
      label: Current evidence / starting anchors
      description: Record the specific files, commands, issue threads, PRs, logs, docs, or other anchors that make this investigation concrete. Write `None` only when there is genuinely no current anchor yet.
      placeholder: |
        Example:
        - A recent closed issue was closed because the concern belonged on an unmerged draft PR, which suggests the repo needs a clearer PR-vs-issue triage rule
        - A recent duplicate issue already had plan-comment work, which suggests the repo needs stronger canonical-issue reuse
        - `skills/github-issue-workflow/SKILL.md`: current guidance does not explicitly require checking recent closed issues and PRs first
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this matters
      placeholder: Why do we need this information now?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Desired output
      placeholder: e.g. documented decision, risk list, implementation direction, feasibility notes
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Constraints / non-goals
      placeholder: Clarify what this research should not drift into.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: What must the investigation produce to be considered complete?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Initial priority
      description: The bundled default label is `priority:p2`. If the selected value differs, replace the label after issue creation.
      options:
        - priority:p0
        - priority:p1
        - priority:p2
        - priority:p3
    validations:
      required: true
  - type: textarea
    id: external_setup
    attributes:
      label: External setup dependencies
      description: Research the official provider or platform docs first, then record the real-world setup a human developer must perform before live verification can pass. For each item, include the provider, what must exist, how to get or configure it, where that happens, who needs access, official doc links, and what verification it unlocks. Never paste secret values into the issue; record the secret name, owning system, storage location, and retrieval path instead. Write `None` if not applicable.
      placeholder: |
        Example:
        - Provider/platform: Example Vendor
          - What must exist: Sandbox account or feature access needed for feasibility testing
          - How to get or configure it: Admin enables sandbox access or provisions the test account
          - Where to do that: Vendor dashboard -> Sandbox settings
          - Who needs access: Vendor account admin
          - Official docs: https://example.com/docs
          - Unlocks: Feasibility testing or live verification
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected repo area
      placeholder: e.g. skills/github-issue-workflow, docs, .github
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Default to the open milestone selected by the skill milestone rule. If the repo has no milestones and you have permission, create and use `1.0`; otherwise ask a maintainer to create it. Any PR for this issue should inherit the same milestone.
      placeholder: e.g. 1.0, 1.1, 2026-04
    validations:
      required: false
  - type: input
    id: ownership
    attributes:
      label: Owning layer or module
      placeholder: e.g. skill packaging, repo workflow, docs
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Proof of completion
      placeholder: Describe the evidence expected, such as a decision comment, risk write-up, or doc update.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Links / references
      placeholder: Link related issues, PRs, docs, examples, or previous decisions.
    validations:
      required: false
