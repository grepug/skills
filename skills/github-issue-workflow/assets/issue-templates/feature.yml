name: Feature
description: Product, workflow, or catalog capability work
title: "feat: "
labels:
  - type:feature
  - priority:p2
body:
  - type: markdown
    attributes:
      value: |
        Write this issue in the repo working language defined in root `AGENTS.md`. If the repo does not define one, use English.
  - type: textarea
    id: problem
    attributes:
      label: Problem / request
      placeholder: What are we building or changing, and for whom?
    validations:
      required: true
  - type: textarea
    id: reviewer_attention
    attributes:
      label: Reviewer attention
      description: Put only the review hotspots here so humans and agents can see the risky surfaces quickly. Call out material dependency changes, schema or data model changes, architecture or boundary changes, migrations, rollout risks, config or secret changes, or external setup. Write `None` only if there is genuinely no special review hotspot.
      placeholder: |
        Example:
        - Adds a new CLI dependency for issue-template validation; review package choice, maintenance cost, and lockfile impact
        - Reshapes the issue workflow plan comment contract; review agent readability and compatibility with existing issue threads
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this matters
      placeholder: Why is this worth doing now?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      placeholder: Describe the visible finished behavior or artifact.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Constraints / non-goals
      placeholder: List what is explicitly out of scope.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: List the checks that determine this work is done.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Initial priority
      description: The bundled default label is `priority:p2`. If the selected value differs, replace the label after issue creation.
      options:
        - priority:p0
        - priority:p1
        - priority:p2
        - priority:p3
    validations:
      required: true
  - type: textarea
    id: external_setup
    attributes:
      label: External setup dependencies
      description: Research the official provider or platform docs first, then record the real-world setup a human developer must perform before live verification can pass. For each item, include the provider, what must exist, how to get or configure it, where that happens, who needs access, official doc links, and what verification it unlocks. Never paste secret values into the issue; record the secret name, owning system, storage location, and retrieval path instead. Write `None` if not applicable.
      placeholder: |
        Example:
        - Provider/platform: GitHub App
          - What must exist: App installed with Issues and Metadata permissions in the target repo
          - How to get or configure it: Repo maintainer installs the app and confirms the permission set
          - Where to do that: GitHub org settings -> GitHub Apps -> Install App
          - Who needs access: Org owner or app admin
          - Official docs: https://docs.github.com/en/developers/apps/managing-github-apps/installing-github-apps
          - Unlocks: Live workflow verification
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected repo area
      placeholder: e.g. skills/github-issue-workflow, scripts/validate_skills.py, .github/ISSUE_TEMPLATE
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Default to the open milestone with the nearest due date. If the repo has no milestones, create and use `1.0`. Any PR for this issue should inherit the same milestone.
      placeholder: e.g. 1.0, 1.1, 2026-04
    validations:
      required: false
  - type: input
    id: ownership
    attributes:
      label: Owning layer or module
      placeholder: e.g. skills/github-issue-workflow, repo docs, GitHub workflow
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: If the issue does not intentionally narrow validation, use the repo defaults.
      placeholder: |
        python3 scripts/quick_validate_skill.py skills/<slug>
        python3 scripts/validate_skills.py
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Links / references
      placeholder: Link related issues, official provider docs, design notes, or previous decisions.
    validations:
      required: false
